  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

er; gap:10px; padding-bottom:14px; margin-bottom:14px; border-bottom:1px solid rgba(224,135,111,.28);\">\n        <span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#C6462F; color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Libre Caslon Display',serif; font-size:16px; line-height:1;\">N<\u002Fspan>\n        <div style=\"min-width:0;\">\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:19px; line-height:1.05; color:#F6EFE0;\">Naramor Boston &amp; Acadia ’26<\u002Fdiv>\n          <div style=\"font-family:'Public Sans',sans-serif; font-size:10.5px; letter-spacing:.14em; color:#9aa6ad; font-weight:600; margin-top:3px;\">FAMILY TRIP · JUL 16–23 · THE FIVE OF US<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ phasePre }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex; justify-content:space-between; align-items:baseline;\">\n          <div style=\"font-family:'Public Sans',sans-serif; font-size:10px; letter-spacing:.24em; color:#E0876F; font-weight:700;\">COUNTDOWN TO WHEELS UP<\u002Fdiv>\n          <div style=\"font-family:'Public Sans',sans-serif; font-size:11px; color:#9aa6ad;\">JetBlue 484 · 9:23 AM<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:baseline; gap:6px; margin-top:6px;\">\n          <span style=\"font-family:'Libre Caslon Display',serif; font-size:44px; line-height:1;\">{{ cd.dd }}<\u002Fspan>\n          <span style=\"font-family:'Public Sans',sans-serif; font-size:13px; color:#9aa6ad; margin-right:8px;\">days<\u002Fspan>\n          <span style=\"font-family:'Libre Caslon Display',serif; font-size:44px; line-height:1;\">{{ cd.hh }}<span style=\"opacity:.4;\">:<\u002Fspan>{{ cd.mm }}<span style=\"opacity:.4;\">:<\u002Fspan>{{ cd.ss }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Public Sans',sans-serif; font-size:12px; color:#c7cfd4; margin-top:8px;\">until we land in Boston · Thursday, July 16, 2026<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ phaseLive }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-family:'Public Sans',sans-serif; font-size:10px; letter-spacing:.24em; color:#E0876F; font-weight:700;\">ON THE TRIP<\u002Fdiv>\n        <div style=\"display:flex; align-items:baseline; gap:8px; margin-top:6px;\">\n          <span style=\"font-family:'Libre Caslon Display',serif; font-size:44px; line-height:1;\">Day {{ liveNum }}<\u002Fspan>\n          <span style=\"font-family:'Public Sans',sans-serif; font-size:14px; color:#9aa6ad;\">of 8<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Public Sans',sans-serif; font-size:13px; color:#c7cfd4; margin-top:8px;\">Today: {{ livePlace }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ phasePost }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-family:'Public Sans',sans-serif; font-size:10px; letter-spacing:.24em; color:#E0876F; font-weight:700;\">HOME AGAIN<\u002Fdiv>\n        <div style=\"font-family:'Libre Caslon Display',serif; font-size:40px; line-height:1; margin-top:8px;\">That’s a wrap.<\u002Fdiv>\n        <div style=\"font-family:'Public Sans',sans-serif; font-size:13px; color:#c7cfd4; margin-top:8px;\">Boston &amp; Acadia · July 2026 · the five of us<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- unified day selector (shared across Days / Route / Pack) -->\n    <sc-if value=\"{{ showSelector }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"flex:none; display:flex; align-items:center; gap:12px; padding:12px 20px; background:#F1E8D6; border-bottom:1px solid rgba(23,36,46,.08);\">\n        <div sc-camel-on-click=\"{{ prev }}\" style=\"{{ prevStyle }}\">←<\u002Fdiv>\n        <div style=\"flex:1; text-align:center;\">\n          <div style=\"font-family:'Public Sans',sans-serif; font-size:10px; letter-spacing:.16em; color:#C6462F; font-weight:700;\">DAY {{ day.n }} · {{ day.day }}<\u002Fdiv>\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:19px; color:#17242E; line-height:1.1;\">{{ day.date }}<\u002Fdiv>\n          <div style=\"display:flex; justify-content:center; gap:5px; margin-top:7px;\">\n            <sc-for list=\"{{ cardDots }}\" as=\"dot\" hint-placeholder-count=\"8\"><span style=\"{{ dot.style }}\"><\u002Fspan><\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div sc-camel-on-click=\"{{ next }}\" style=\"{{ nextStyle }}\">→<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- scrollable mode content (horizontal drag swipes days) -->\n    <div class=\"scrollarea\" sc-camel-on-pointer-down=\"{{ onSwipeStart }}\" sc-camel-on-pointer-up=\"{{ onSwipeEnd }}\" style=\"flex:1; overflow-y:auto; min-height:0; touch-action:pan-y;\">\n\n      <!-- DAYS -->\n      <sc-if value=\"{{ modeDays }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"padding:16px 20px 24px; max-width:640px; margin:0 auto;\">\n          <div style=\"position:relative; margin-bottom:16px; height:220px; border-radius:16px; overflow:hidden; background:#e7decb;\">\n            {{ dayScene }}\n            {{ day.photoEl }}\n            <span style=\"position:absolute; top:14px; left:14px; z-index:2; background:#C6462F; color:#fff; font-family:'Public Sans',sans-serif; font-size:11px; font-weight:700; letter-spacing:.1em; padding:6px 11px; border-radius:999px;\">DAY {{ day.n }}<\u002Fspan>\n            <span style=\"position:absolute; bottom:12px; left:14px; z-index:2; color:#fff; font-family:'Public Sans',sans-serif; font-size:11px; font-weight:700; letter-spacing:.12em; text-shadow:0 1px 6px rgba(0,0,0,.5);\">{{ day.img }}<\u002Fspan>\n            <span style=\"position:absolute; top:13px; right:13px; z-index:2; opacity:{{ day.tagOpacity }}; background:rgba(23,36,46,.6); color:#f0e7d6; font-family:ui-monospace,Menlo,monospace; font-size:10px; padding:4px 8px; border-radius:6px;\">{{ day.photo }}<\u002Fsp :{{ day.effortPct }}%; background:#C6462F;\"><\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Public Sans',sans-serif; font-size:13px; color:#6b6252; margin-top:12px;\">STAY · {{ day.lodging }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ROUTE (day-aware, leg-based: fly / drive / walk, stacked) -->\n      <sc-if value=\"{{ modeMap }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"padding:16px 20px 24px; max-width:640px; margin:0 auto;\">\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:24px; color:#17242E; line-height:1.1;\">{{ day.title }}<\u002Fdiv>\n          <div style=\"font-family:'Public Sans',sans-serif; font-size:12px; letter-spacing:.04em; color:#8a8069; margin-top:3px;\">{{ legLabel }}<\u002Fdiv>\n\n          <sc-for list=\"{{ legViews }}\" as=\"leg\" hint-placeholder-count=\"1\">\n            <div style=\"margin-top:16px;\">\n              <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;\">\n                <span style=\"{{ leg.chipStyle }}\">{{ leg.moveType }}<\u002Fspan>\n                <span style=\"font-family:'Public Sans',sans-serif; font-size:12px; color:#8a8069;\">{{ leg.stat }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"border-radius:16px; padding:6px; background:{{ leg.ocean }};\">\n                <div style=\"position:relative; border-radius:12px; overflow:hidden; aspect-ratio:4/3;\">\n                <svg sc-camel-view-box=\"0 0 320 240\" style=\"width:100%; height:100%; display:block;\">\n                  <path d=\"{{ leg.landPath }}\" fill=\"{{ leg.landFill }}\" stroke=\"{{ leg.landStroke }}\" sc-camel-stroke-width=\"1.2\" sc-camel-stroke-linejoin=\"round\"><\u002Fpath>\n                  <path d=\"{{ leg.casingPath }}\" fill=\"none\" stroke=\"#f2e3cf\" sc-camel-stroke-width=\"{{ leg.casingW }}\" sc-camel-stroke-linecap=\"round\" sc-camel-stroke-line

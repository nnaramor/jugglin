document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

er; gap:10px; padding-bottom:14px; margin-bottom:14px; border-bottom:1px solid rgba(224,135,111,.28);\">\n        <span style=\"flex:none; width:34px; height:34px; border-radius:9px; background:#C6462F; color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Libre Caslon Display',serif; font-size:16px; line-height:1;\">N<\u002Fspan>\n        <div style=\"min-width:0;\">\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:19px; line-height:1.05; color:#F6EFE0;\">Naramor Boston &amp; Acadia ’26<\u002Fdiv>\n          <div style=\"font-family:'Public Sans',sans-serif; font-size:10.5px; letter-spacing:.14em; color:#9aa6ad; font-weight:600; margin-top:3px;\">FAMILY TRIP · JUL 16–23 · THE FIVE OF US<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ phasePre }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex; justify-content:space-between; align-items:baseline;\">\n          <div style=\"font-family:'Public Sans',sans-serif; font-size:10px; letter-spacing:.24em; color:#E0876F; font-weight:700;\">COUNTDOWN TO WHEELS UP<\u002Fdiv>\n          <div style=\"font-family:'Public Sans',sans-serif; font-size:11px; color:#9aa6ad;\">JetBlue 484 · 9:23 AM<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:baseline; gap:6px; margin-top:6px;\">\n          <span style=\"font-family:'Libre Caslon Display',serif; font-size:44px; line-height:1;\">{{ cd.dd }}<\u002Fspan>\n          <span style=\"font-family:'Public Sans',sans-serif; font-size:13px; color:#9aa6ad; margin-right:8px;\">days<\u002Fspan>\n          <span style=\"font-family:'Libre Caslon Display',serif; font-size:44px; line-height:1;\">{{ cd.hh }}<span style=\"opacity:.4;\">:<\u002Fspan>{{ cd.mm }}<span style=\"opacity:.4;\">:<\u002Fspan>{{ cd.ss }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Public Sans',sans-serif; font-size:12px; color:#c7cfd4; margin-top:8px;\">until we land in Boston · Thursday, July 16, 2026<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ phaseLive }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-family:'Public Sans',sans-serif; font-size:10px; letter-spacing:.24em; color:#E0876F; font-weight:700;\">ON THE TRIP<\u002Fdiv>\n        <div style=\"display:flex; align-items:baseline; gap:8px; margin-top:6px;\">\n          <span style=\"font-family:'Libre Caslon Display',serif; font-size:44px; line-height:1;\">Day {{ liveNum }}<\u002Fspan>\n          <span style=\"font-family:'Public Sans',sans-serif; font-size:14px; color:#9aa6ad;\">of 8<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Public Sans',sans-serif; font-size:13px; color:#c7cfd4; margin-top:8px;\">Today: {{ livePlace }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ phasePost }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-family:'Public Sans',sans-serif; font-size:10px; letter-spacing:.24em; color:#E0876F; font-weight:700;\">HOME AGAIN<\u002Fdiv>\n        <div style=\"font-family:'Libre Caslon Display',serif; font-size:40px; line-height:1; margin-top:8px;\">That’s a wrap.<\u002Fdiv>\n        <div style=\"font-family:'Public Sans',sans-serif; font-size:13px; color:#c7cfd4; margin-top:8px;\">Boston &amp; Acadia · July 2026 · the five of us<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- unified day selector (shared across Days / Route / Pack) -->\n    <sc-if value=\"{{ showSelector }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"flex:none; display:flex; align-items:center; gap:12px; padding:12px 20px; background:#F1E8D6; border-bottom:1px solid rgba(23,36,46,.08);\">\n        <div onclick=\"{{ prev }}\" style=\"{{ prevStyle }}\">←<\u002Fdiv>\n        <div style=\"flex:1; text-align:center;\">\n          <div style=\"font-family:'Public Sans',sans-serif; font-size:10px; letter-spacing:.16em; color:#C6462F; font-weight:700;\">DAY {{ day.n }} · {{ day.day }}<\u002Fdiv>\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:19px; color:#17242E; line-height:1.1;\">{{ day.date }}<\u002Fdiv>\n          <div style=\"display:flex; justify-content:center; gap:5px; margin-top:7px;\">\n            <sc-for list=\"{{ cardDots }}\" as=\"dot\" hint-placeholder-count=\"8\"><span style=\"{{ dot.style }}\"><\u002Fspan><\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div onclick=\"{{ next }}\" style=\"{{ nextStyle }}\">→<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- scrollable mode content (horizontal drag swipes days) -->\n    <div class=\"scrollarea\" onpointerdown=\"{{ onSwipeStart }}\" onpointerup=\"{{ onSwipeEnd }}\" style=\"flex:1; overflow-y:auto; min-height:0; touch-action:pan-y;\">\n\n      <!-- DAYS -->\n      <sc-if value=\"{{ modeDays }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"padding:16px 20px 24px; max-width:640px; margin:0 auto;\">\n          <div style=\"position:relative; margin-bottom:16px; height:220px; border-radius:16px; overflow:hidden; background:#e7decb;\">\n            {{ dayScene }}\n            {{ day.photoEl }}\n            <span style=\"position:absolute; top:14px; left:14px; z-index:2; background:#C6462F; color:#fff; font-family:'Public Sans',sans-serif; font-size:11px; font-weight:700; letter-spacing:.1em; padding:6px 11px; border-radius:999px;\">DAY {{ day.n }}<\u002Fspan>\n            <span style=\"position:absolute; bottom:12px; left:14px; z-index:2; color:#fff; font-family:'Public Sans',sans-serif; font-size:11px; font-weight:700; letter-spacing:.12em; text-shadow:0 1px 6px rgba(0,0,0,.5);\">{{ day.img }}<\u002Fspan>\n            <span style=\"position:absolute; top:13px; right:13px; z-index:2; opacity:{{ day.tagOpacity }}; background:rgba(23,36,46,.6); color:#f0e7d6; font-family:ui-monospace,Menlo,monospace; font-size:10px; padding:4px 8px; border-radius:6px;\">{{ day.photo }}<\u002Fspan>\n          <\u002Fdiv>\n\n          <d solute', inset:0, width:'100%', height:'100%', objectFit:'cover' } }) : null;\n      v.tagOpacity = ok[v.mapKey] ? 0 : 1;\n      return v;\n    });\n    const modeName = (m) => m === 'fly' ? 'Fly' : (m === 'drive' ? 'Drive' : 'Walk');\n    const legLabel = (day.legs.length === 1 ? '1 leg' : day.legs.length + ' legs') + ' \\u00b7 ' + day.legs.map(l => modeName(l.mode)).join(' + ');\n\n    const cardDots = DAYS.map((d, i) => ({ style:{ width:i===card?'20px':'7px', height:'7px', borderRadius:'999px', background:i===card?'#C6462F':'rgba(23,36,46,.16)', transition:'all .2s ease', display:'inline-block' } }));\n    const navBtn = { width:'44px', height:'44px', borderRadius:'14px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'18px', cursor:'pointer', userSelect:'none', flex:'none', fontFamily:\"'Public Sans',sans-serif\" };\n    const prevStyle = card===0 ? { ...navBtn, background:'#e2d6bd', color:'#bcb199', cursor:'default' } : { ...navBtn, background:'#17242E', color:'#F6EFE0' };\n    const nextStyle = card===DAYS.length-1 ? { ...navBtn, background:'#e2d6bd', color:'#bcb199', cursor:'default' } : { ...navBtn, background:'#C6462F', color:'#fff' };\n\n    const mode = this.state.mode;\n    const navStyle = (on) => ({ flex:1, textAlign:'center', padding:'9px 0', borderRadius:'12px', cursor:'pointer', userSelect:'none', fontFamily:\"'Public Sans',sans-serif\", fontSize:'13px', fontWeight:on?700:500, letterSpacing:'.02em', color:on?'#C6462F':'#8a8069', background:on?'#fff':'transparent', boxShadow:on?'0 2px 8px rgba(23,36,46,.08)':'none' });\n\n    const goDay = (dir) => this.setState(s => ({ card: Math.max(0, Math.min(DAYS.length-1, s.card + dir)) }));\n\n    const target = new Date('2026-07-16T09:23:00-04:00').getTime();\n    const tripEnd = new Date('2026-07-23T13:00:00-04:00').getTime();\n    const nowMs = this.state.now;\n    const diff = Math.max(0, target - nowMs);\n    const p2 = (x) => String(x).padStart(2,'0');\n    const cd = { dd:Math.fl
